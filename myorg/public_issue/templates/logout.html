{% load static %}
<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Logout - SSC</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;family=Poppins:wght@600&amp;family=Open+Sans:wght@400;600&amp;display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "primary": "#1C67DF",
                  "background": "#f7f9fe",
                  "surface": "#f7f9fe"
                },
                fontFamily: {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Inter"],
                  "montserrat": ["Montserrat"],
                  "poppins": ["Poppins"]
                }
              },
            },
          }
    </script>
    <style>
          .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          }
    </style>
</head>
<body class="bg-background text-slate-900 font-body min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Abstract Background -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/10 blur-3xl rounded-full"></div>
    <div class="absolute bottom-10 -right-20 w-80 h-80 bg-blue-200/20 blur-3xl rounded-full"></div>

    <div class="relative z-10 w-full max-w-md bg-white rounded-3xl shadow-xl p-10 border border-slate-100 text-center animate-[fadeIn_0.4s_ease-out]">
        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-8">
            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>
        
        <h1 class="text-3xl font-bold font-montserrat text-slate-900 tracking-tight mb-4">Logged Out</h1>
        <p class="text-slate-500 text-lg mb-2">You have been logged out successfully.</p>
        <p class="text-slate-400 text-sm mb-10 font-opensans">Thank you for using UrbanEcho.</p>
        
        <a href="{% url 'home' %}" class="inline-flex items-center justify-center w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg hover:shadow-primary/30 active:scale-95 transition-all font-poppins gap-2">
        <span class="material-symbols-outlined text-xl">home</span>
        Go to Home
        </a>
        </div>

    <style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    </style>
</body>
</html>
