{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Give Rating</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-[400px]">

        <h2 class="text-2xl font-bold text-center mb-6">
            Rate Issue {{ issue_id }}
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <label class="block text-gray-700 font-semibold">
                Select Rating
            </label>

            <select name="rating" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="1">⭐ 1 Star</option>
                <option value="2">⭐⭐ 2 Star</option>
                <option value="3">⭐⭐⭐ 3 Star</option>
                <option value="4">⭐⭐⭐⭐ 4 Star</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 Star</option>
            </select>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Submit Rating
            </button>

            <a href="{% url 'userdashboard' %}"
               class="block text-center text-gray-500 hover:text-red-500">
               Cancel
            </a>
        </form>

    </div>
</div>

</body>
</html>
